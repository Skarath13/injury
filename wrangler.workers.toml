name = "california-injury-calculator"
main = "worker.js"
compatibility_date = "2024-01-01"

# Account and deployment details
# workers_dev = true  # Set to false if using custom domain
# route = "example.com/api/*"  # If using custom domain

# Build configuration
# [build]
# command = "npm run build"

# Environment variables (add production values in Cloudflare dashboard)
[vars]
NODE_ENV = "production"
SMS_PROVIDER = "twilio"
GEO_ACCESS_MODE = "california"

# Replace placeholder IDs after creating Cloudflare resources:
#   wrangler d1 create california-injury-leads
#   wrangler kv namespace create ATTORNEY_ROUTING
[[d1_databases]]
binding = "LEADS_DB"
database_name = "california-injury-leads"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "ATTORNEY_ROUTING"
id = "00000000000000000000000000000000"

# Define different environments
[env.production]
name = "california-injury-calculator-prod"
vars = { NODE_ENV = "production", SMS_PROVIDER = "twilio", GEO_ACCESS_MODE = "california" }

[[env.production.d1_databases]]
binding = "LEADS_DB"
database_name = "california-injury-leads-prod"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

[[env.production.kv_namespaces]]
binding = "ATTORNEY_ROUTING"
id = "00000000000000000000000000000000"

[env.staging]
name = "california-injury-calculator-staging"
vars = { NODE_ENV = "development", SMS_PROVIDER = "dev_stub", OTP_DEV_MODE = "true", GEO_ACCESS_MODE = "off", GEO_ALLOW_UNKNOWN = "true" }

[[env.staging.d1_databases]]
binding = "LEADS_DB"
database_name = "california-injury-leads-staging"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

[[env.staging.kv_namespaces]]
binding = "ATTORNEY_ROUTING"
id = "00000000000000000000000000000000"

# Development server configuration
[dev]
port = 8787
local_protocol = "http"

# Compatibility flags
compatibility_flags = ["nodejs_compat"]

# Site configuration for static assets
[site]
bucket = ".vercel/output/static"

# Rate limiting rules (configure in Cloudflare dashboard)
# [[rules]]
# type = "RateLimit"
# match = "/api/calculate"
# threshold = 10
# period = 60

# CORS configuration is handled in the worker code

# Optional: Durable Objects if needed for state management
# [[durable_objects.bindings]]
# name = "COUNTER"
# class_name = "Counter"

# MCP Server Worker Configuration
# To deploy the MCP server separately:
# wrangler deploy functions/mcp-server.ts --name california-injury-mcp
